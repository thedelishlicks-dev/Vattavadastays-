<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stayidom.in</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#166534" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+Malayalam:wght@400;500;600&display=swap" rel="stylesheet" />

    <!--
      Early branding script — runs before React loads.
      On a property subdomain (bleafmudhouse.stayidom.in) or admin page,
      fetches the property name + logo from Supabase and sets:
        - document.title          → iOS uses this as the PWA app name
        - apple-mobile-web-app-title meta → fallback for iOS
        - apple-touch-icon link   → iOS home screen icon
        - manifest link           → dynamic manifest for Android Chrome
      This fires early enough that iOS Safari sees the correct values
      before the owner opens the share sheet to install the PWA.
    -->
    <script>
      (function () {
        var SUPABASE_URL = 'https://vzzfqgqxnodlrvnaxpbw.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6emZxZ3F4bm9kbHJ2bmF4cGJ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ5NzM5NjIsImV4cCI6MjA2MDU0OTk2Mn0.GVHLqZK9r1bY5lTZsNBIB1S6gWFExWHs1uXJfVKf-rY';

        // Detect subdomain — works on both stayidom.in and vercel previews
        var hostname = window.location.hostname;
        var subdomain = null;

        // Production subdomain: bleafmudhouse.stayidom.in
        if (hostname.endsWith('.stayidom.in')) {
          var parts = hostname.split('.');
          if (parts.length >= 3) subdomain = parts[0];
        }

        // Admin page: read ?property= param (superadmin managing a property)
        // or rely on the owner's subdomain detected above
        var isAdmin = window.location.pathname.startsWith('/admin');

        // If no subdomain from hostname, check ?property= or ?slug= params
        if (!subdomain) {
          var params = new URLSearchParams(window.location.search);
          subdomain = params.get('property') || params.get('slug');
        }

        // Nothing to do if we can't determine subdomain
        if (!subdomain) return;

        // Set dynamic manifest immediately — even before property fetch completes
        // This ensures Android Chrome picks up the right manifest on install
        var manifestLink = document.querySelector('link[rel="manifest"]');
        if (manifestLink) {
          manifestLink.href = '/api/manifest?subdomain=' + encodeURIComponent(subdomain);
        }

        // Fetch property name + logo — lightweight single-row query
        fetch(
          SUPABASE_URL + '/rest/v1/properties?subdomain=eq.' + encodeURIComponent(subdomain) + '&select=name,logo_url&limit=1',
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            }
          }
        )
        .then(function (res) { return res.json(); })
        .then(function (rows) {
          var property = rows && rows[0];
          if (!property) return;

          // Set page title — iOS Safari reads this as the PWA app name
          if (property.name) {
            document.title = property.name;

            var titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (titleMeta) titleMeta.setAttribute('content', property.name);
          }

          // Set apple-touch-icon — iOS reads this at install time
          if (property.logo_url) {
            var icon = document.querySelector('link[rel="apple-touch-icon"]');
            if (icon) icon.setAttribute('href', property.logo_url);
          }
        })
        .catch(function () {
          // Silently fail — React will set everything correctly once it loads
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
